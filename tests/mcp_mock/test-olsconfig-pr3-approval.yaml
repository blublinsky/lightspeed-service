# Complete OLS config for MCP testing with Tool Filtering (PR3) + approvals
# Based on test-olsconfig-pr3.yaml with tools_approval added
---
llm_providers:
  # OpenAI provider - will be used for actual query responses
  - name: test_provider
    type: openai
    url: "https://api.openai.com/v1"
    credentials_path: /tmp/test-openai-key
    models:
      - name: gpt-4o-mini

ols_config:
  # Conversation cache (in-memory for testing)
  conversation_cache:
    type: memory
    memory:
      max_entries: 1000

  # Logging configuration
  logging_config:
    app_log_level: info
    lib_log_level: warning
    uvicorn_log_level: info

  # Default LLM (uses OpenAI)
  default_provider: test_provider
  default_model: gpt-4o-mini

  # Disable query validation for simpler testing
  query_validation_method: disabled

  # Use noop-with-token auth to allow kubernetes placeholder
  authentication_config:
    module: noop-with-token

  # PR3 Feature: Tool Filtering with RAG
  tool_filtering:
    embed_model_path: "sentence-transformers/all-MiniLM-L6-v2"
    alpha: 0.5  # Balance between dense (0.0) and sparse (1.0) retrieval
    top_k: 5    # Return top 5 filtered tools
    threshold: 0.3  # Minimum similarity score

  # Approval config for testing approval-required tool flow
  tools_approval:
    approval_type: tool_annotations
    approval_timeout: 60

# Dev configuration - disable TLS for local testing (but keep auth as noop-with-token)
dev_config:
  enable_dev_ui: false
  disable_auth: false  # Keep auth enabled (using noop-with-token)
  disable_tls: true

# MCP Servers - Four auth patterns to test
mcp_servers:
  # Test 1: No authentication (no headers at all)
  - name: mock-no-auth
    url: http://localhost:3000

  # Test 2: File-based authentication (static token from file)
  - name: mock-file-auth
    url: http://localhost:3000
    headers:
      Authorization: /tmp/mcp-test-token

  # Test 3: Kubernetes authentication (user's k8s token passthrough)
  - name: mock-k8s-auth
    url: http://localhost:3000
    headers:
      Authorization: kubernetes

  # Test 4: Client-provided authentication (PR2 feature!)
  - name: mock-client-auth
    url: http://localhost:3000
    headers:
      Authorization: client
